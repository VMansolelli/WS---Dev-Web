<!doctype html>
<html>
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .container {
        background-color: navy;
        width: 600px;
        margin: 5px;
        padding: 10px;
      }

      .item {
        background-color: coral;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
        text-align: center;
      }

      .grid {
        display: grid;
        grid-template-columns: 150px 150px 150px;
        grid-template-rows: 100px 100px;
        gap: 20px;
      }

      .inline-grid {
        display: inline-grid;
        grid-template-columns: 120px 120px;
        grid-template-rows: 80px 80px;
        gap: 10px;
      }

      .gap-separado {
        display: grid;
        grid-template-columns: 150px 150px 150px;
        grid-template-rows: 100px 100px;
        row-gap: 30px;
        column-gap: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Display Grid</h1>
    <h2>Grid</h2>
    <!-- Container em grid ocupando a largura da linha -->
    <div class="container grid">
      <div class="item">Item 1</div>
      <div class="item">Item 2</div>
      <div class="item">Item 3</div>
      <div class="item">Item 4</div>
      <div class="item">Item 5</div>
      <div class="item">Item 6</div>
    </div>
    <h2>Inline Grid</h2>
    <!-- Container inline-grid ocupa somente o tamanho do conteúdo -->
    <div class="container inline-grid">
      <div class="item">Item 1</div>
      <div class="item">Item 2</div>
      <div class="item">Item 3</div>
      <div class="item">Item 4</div>
      <div class="item">Item 5</div>
      <div class="item">Item 6</div>
    </div>
    <h2>Gap para colunas e linhas</h2>
    <!-- Espaçamento diferente entre linhas e colunas -->
    <div class="container gap-separado">
      <div class="item">Linha 1</div>
      <div class="item">Linha 1</div>
      <div class="item">Linha 1</div>
      <div class="item">Linha 2</div>
      <div class="item">Linha 2</div>
      <div class="item">Linha 2</div>
    </div>
  </body>
</html>
