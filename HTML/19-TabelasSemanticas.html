<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas Semânticas</title>
</head>
<body>
    <h1>Tabelas Semânticas</h1>
    <table border="1">
        <caption>
            Título Tabela
        </caption>
        <thead>
            <tr>
                <th scope="col">Titulo1</th>
                <th scope="col">Titulo2</th>
                <th scope="col">Titulo3</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row" rowspan="2">Subtitulo</th>
                <td>Dado1</td>
                <td>Dado2</td>
            </tr>
            <tr>
                <td>Dado1</td>
                <td>Dado2</td>
            </tr>
        </tbody>
        <tfoot>
            <th scope="row" colspan="3">Rodapé</th>
        </tfoot>
    </table>
</body>
</html>
