<!DOCTYPE html>
<html>
<head>
  <style>
.cards {
  display: flex;
  gap: 20px;
  background: navy;
  padding: 15px;
}

.card {
  flex: 1;
  background: coral;
  color: white;
  padding: 30px;
  text-align: center;
}

.aviso {
  background: green;
  color: white;
  padding: 15px;
  margin-top: 20px;
  text-align: center;
}

@media (max-width: 700px) {
  .cards {
    flex-direction: column;
  }

  .card {
    background: purple;
  }

  .aviso {
    background-color: crimson;
    font-size: 14px;
  }
}

@media (max-width: 480px) {
      .card {
    background: magenta;
  }

  .aviso {
    background-color: brown;
    font-size: 14px;
  }
}
  </style>
</head>
<body>

  <h1>Media Queries</h1>

<section class="cards">
  <div class="card">Card 1</div>
  <div class="card">Card 2</div>
  <div class="card">Card 3</div>
</section>
<div class="aviso">
  Redimensione a tela para ver a mudança no layout.
</div>

</body>
</html>
