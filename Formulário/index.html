<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Formulário de Cadastro</h1>
    <form action="/" method="post">
        <h2>Dados pessoais</h2>
        <label for="nome">Nome Completo:</label>
        <input type="text" name="nome" id="nome" placeholder="Digite seu nome completo" required>
        <br>
        <label for="email">E-mail:</label>
        <input type="email" name="email" id="email" placeholder="exemplo@exemplo.com" required>
        <br>
        <label for="telefone">Telefone:</label>
        <input type="tel" name="telefone" id="telefone">
        <br>
        <label for="senha">Senha:</label>
        <input type="password" name="senha" id="senha">
        <br>
        <label for="idade">Idade:</label>
        <input type="number" name="idade" id="idade">
        <br>
        <label for="genero">Gênero</label>
        <--! A tag select serve para criar um menu suspenso, onde o usuário pode escolher apenas uma opção. O atributo "required" torna a seleção obrigatória. -->
        <select name="genero" id="genero" required>
            <option value="" selected disabled>Selecione...</option>
            <option value="feminino">Feminino</option>
            <option value="masculino">Masculino</option>
            <option value="outro">Outro</option>
        </select>
        <br>
        <h2>Interesses</h2>
        <input type="checkbox" name="interesses" id="tecnologia" value="tecnologia">
        <label class="checkbox" for="tecnologia">Tecnologia</label>
        <input type="checkbox" name="interesses" id="esportes" value="esportes">
        <label class="checkbox" for="esportes">Esportes</label>
        <input type="checkbox" name="interesses" id="musica" value="musica">
        <label class="checkbox" for="musica">Música</label>
        <br>
        <label for="newsletter">Deseja receber nossa newsletter?</label>
        <input type="radio" name="newsletter" id="newsletter" value="sim">
        <label for="sim">Sim</label>
        <input type="radio" name="newsletter" id="newsletter" value="nao">
        <label for="nao">Não</label>
        <br>
        <h2>Informações adicionais</h2>
        <label for="sonho">Sonhos:</label>
        <textarea name="sonho" id="sonho" rows="5" cols="20" placeholder="Conte-nos seus maiores sonhos"></textarea>
        <br>
        <label for="cor">Cor favorita:</label>
        <input type="color" name="cor" id="cor">
        <br>
        <label for="data">Data de Nascimento</label>
        <input type="date" name="data" id="data">
        <br>
        <label for="arquivo">Envie uma foto:</label>
        <input type="file" name="arquivo" id="arquivo">


        <br>
        <br>
        <button type="submit">Enviar formulário</button>
    </form>
</body>
</html>
